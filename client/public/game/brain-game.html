<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain GLB Viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05080d;
        color: #dffff8;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
      }

      body {
        background:
          radial-gradient(
            circle at 50% 38%,
            rgba(0, 212, 170, 0.18),
            transparent 26%
          ),
          radial-gradient(
            circle at 20% 70%,
            rgba(70, 130, 255, 0.14),
            transparent 26%
          ),
          linear-gradient(135deg, #05080d, #071016 58%, #020305);
      }

      #stage {
        position: fixed;
        inset: 0;
      }

      #stage canvas {
        display: block;
      }

      .hud {
        position: fixed;
        left: 24px;
        top: 24px;
        z-index: 2;
        width: min(380px, calc(100vw - 48px));
        padding: 20px;
        border: 1px solid rgba(0, 212, 170, 0.32);
        border-radius: 22px;
        background: rgba(3, 10, 15, 0.72);
        box-shadow:
          0 0 70px rgba(0, 212, 170, 0.14),
          inset 0 0 60px rgba(0, 212, 170, 0.05);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        color: #00d4aa;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00d4aa;
        box-shadow: 0 0 24px #00d4aa;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(24px, 6vw, 44px);
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 0 0 16px;
        color: rgba(210, 255, 248, 0.72);
        font-size: 13px;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      label,
      button {
        appearance: none;
        border: 1px solid rgba(0, 212, 170, 0.45);
        border-radius: 999px;
        background: rgba(0, 212, 170, 0.12);
        color: #dffff8;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 10px 14px;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      label:hover,
      button:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 212, 170, 0.9);
        background: rgba(0, 212, 170, 0.2);
      }

      input[type="file"] {
        display: none;
      }

      .status {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 2;
        max-width: min(760px, calc(100vw - 44px));
        transform: translateX(-50%);
        border: 1px solid rgba(210, 255, 248, 0.18);
        border-radius: 999px;
        background: rgba(3, 10, 15, 0.68);
        color: rgba(210, 255, 248, 0.78);
        font-size: 12px;
        line-height: 1.5;
        padding: 10px 16px;
        text-align: center;
        backdrop-filter: blur(14px);
      }

      @media (max-width: 640px) {
        .hud {
          left: 14px;
          top: 14px;
          width: calc(100vw - 28px);
          padding: 16px;
        }

        .actions {
          gap: 8px;
        }

        label,
        button {
          min-height: 44px;
          padding: 10px 12px;
          line-height: 1.25;
        }

        .status {
          bottom: 14px;
          border-radius: 18px;
          overflow-wrap: anywhere;
        }
      }
    </style>
  </head>
  <body>
    <div id="stage" aria-label="3D brain model stage"></div>

    <main class="hud">
      <div class="eyebrow"><span class="dot"></span> GLB Brain Module</div>
      <h1>Brain Game</h1>
      <p>
        หน้านี้โหลดโมเดล <strong>.glb</strong> จาก
        <code>/models/brain.glb</code> อัตโนมัติ
        หรือเลือกไฟล์จากเครื่องเพื่อทดสอบโมเดลได้ทันที
      </p>
      <div class="actions">
        <label for="modelFile">เลือกไฟล์ .glb</label>
        <input
          id="modelFile"
          type="file"
          accept=".glb,.gltf,model/gltf-binary,model/gltf+json"
        />
        <button id="resetView" type="button">รีเซ็ตมุมกล้อง</button>
      </div>
    </main>

    <div id="status" class="status">กำลังโหลด /models/brain.glb ...</div>

    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.js",
          "three/addons/": "/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const MODEL_URL = "/models/brain.glb";
      const stage = document.getElementById("stage");
      const status = document.getElementById("status");
      const fileInput = document.getElementById("modelFile");
      const resetButton = document.getElementById("resetView");

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x05080d, 0.035);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.2, 6);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: "high-performance",
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.25;
      stage.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.65;
      controls.target.set(0, 0.2, 0);

      const modelRoot = new THREE.Group();
      scene.add(modelRoot);

      scene.add(new THREE.AmbientLight(0x9ccfff, 0.75));

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
      keyLight.position.set(3, 4, 5);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0x00d4aa, 2.8);
      rimLight.position.set(-4, 2, -3);
      scene.add(rimLight);

      const backLight = new THREE.PointLight(0x00d4aa, 15, 18);
      backLight.position.set(0, 0, -5);
      scene.add(backLight);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(2.15, 0.018, 16, 160),
        new THREE.MeshBasicMaterial({
          color: 0x00d4aa,
          transparent: true,
          opacity: 0.55,
        })
      );
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      const particles = createParticles();
      scene.add(particles);

      let activeModelUrl = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function clearModel() {
        while (modelRoot.children.length) {
          const child = modelRoot.children.pop();
          if (!child) continue;
          child.traverse?.(node => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) {
              const materials = Array.isArray(node.material)
                ? node.material
                : [node.material];
              materials.forEach(material => material.dispose?.());
            }
          });
        }
      }

      function frameModel(model) {
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        model.position.sub(center);
        const maxAxis = Math.max(size.x, size.y, size.z);
        const scale = maxAxis > 0 ? 3 / maxAxis : 1;
        model.scale.setScalar(scale);

        controls.target.set(0, 0, 0);
        camera.position.set(0, 1.2, 6);
        controls.update();
      }

      function polishModel(model) {
        model.traverse(child => {
          if (!child.isMesh) return;
          child.castShadow = false;
          child.receiveShadow = false;

          const materials = Array.isArray(child.material)
            ? child.material
            : [child.material];
          materials.forEach(material => {
            if (!material) return;
            material.side = THREE.DoubleSide;
            if ("envMapIntensity" in material) material.envMapIntensity = 0.85;
            if ("emissive" in material) {
              material.emissive = new THREE.Color(0x061b20);
              material.emissiveIntensity = Math.max(
                material.emissiveIntensity || 0,
                0.12
              );
            }
          });
        });
      }

      function loadModel(url, label = url) {
        const loader = new GLTFLoader();
        activeModelUrl = url;
        setStatus(`กำลังโหลด ${label} ...`);

        loader.load(
          url,
          gltf => {
            if (activeModelUrl !== url) return;
            clearModel();
            const model = gltf.scene;
            polishModel(model);
            frameModel(model);
            modelRoot.add(model);
            setStatus(
              `โหลดโมเดลสำเร็จ: ${label} | ลากเพื่อหมุน ซูมเพื่อเข้าใกล้`
            );
          },
          event => {
            if (!event.total) return;
            const percent = Math.round((event.loaded / event.total) * 100);
            setStatus(`กำลังโหลด ${label}: ${percent}%`);
          },
          () => {
            setStatus(
              `ยังไม่พบ ${MODEL_URL} - วางไฟล์ brain.glb ใน client/public/models หรือกดเลือกไฟล์ .glb`
            );
            createFallbackBrain();
          }
        );
      }

      function createFallbackBrain() {
        clearModel();
        const geometry = new THREE.IcosahedronGeometry(1.5, 6);
        const material = new THREE.MeshPhysicalMaterial({
          color: 0xd0d8ff,
          roughness: 0.55,
          metalness: 0.08,
          clearcoat: 0.35,
          transparent: true,
          opacity: 0.9,
          emissive: 0x061b20,
          emissiveIntensity: 0.2,
        });
        modelRoot.add(new THREE.Mesh(geometry, material));
      }

      function createParticles() {
        const count = 900;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i += 1) {
          positions[i * 3] = (Math.random() - 0.5) * 16;
          positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 16;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3)
        );
        const material = new THREE.PointsMaterial({
          color: 0x7fffea,
          size: 0.018,
          transparent: true,
          opacity: 0.58,
        });
        return new THREE.Points(geometry, material);
      }

      fileInput.addEventListener("change", () => {
        const file = fileInput.files?.[0];
        if (!file) return;
        loadModel(URL.createObjectURL(file), file.name);
      });

      resetButton.addEventListener("click", () => {
        camera.position.set(0, 1.2, 6);
        controls.target.set(0, 0, 0);
        controls.update();
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        modelRoot.rotation.y += 0.002;
        modelRoot.scale.setScalar(1 + Math.sin(time * 2.2) * 0.012);
        ring.rotation.z += 0.006;
        particles.rotation.y -= 0.0008;
        controls.update();
        renderer.render(scene, camera);
      }

      loadModel(MODEL_URL);
      animate();
    </script>
  </body>
</html>
